name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check evalkit/ tests/ examples/

      - name: Check formatting with ruff
        run: ruff format --check evalkit/ tests/ examples/

      - name: Type check with mypy
        run: mypy evalkit/

      - name: Run tests with coverage
        run: pytest --cov=evalkit --cov-report=xml --cov-report=term-missing --cov-fail-under=100 -v -m "not slow"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

  example:
    name: Run full workflow example
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run full workflow (no API keys required)
        run: python examples/full_workflow.py
      - name: Run benchmark audit
        run: python examples/benchmark_audit.py
      - name: Verify notebook executes cleanly
        run: |
          pip install nbconvert ipykernel
          jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 \
            --output /tmp/walkthrough_ci.ipynb examples/walkthrough.ipynb
          echo "Notebook executed successfully"

  package:
    name: Verify package builds
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install build
      - name: Build wheel and sdist
        run: python -m build
      - name: Verify sdist includes example data (MANIFEST.in smoke test)
        run: |
          tar -tzf dist/evalkit_research-*.tar.gz | grep "examples/data/balanced_demo.jsonl"
          tar -tzf dist/evalkit_research-*.tar.gz | grep "examples/walkthrough.ipynb"
          tar -tzf dist/evalkit_research-*.tar.gz | grep "docs/statistical_methods.md"
          echo "MANIFEST.in OK - all expected files present in sdist"
      - run: pip install dist/*.whl
      - name: Smoke test installed package
        run: |
          python -c '
          import evalkit
          print(evalkit.__version__)
          from evalkit import (
              PowerAnalysis, Experiment, EvalDataset, PromptTemplate,
              MockRunner, ExactMatchJudge, Accuracy, RigorChecker,
              McNemarTest, BHCorrection, CohenKappa,
              PrecisionScore, RecallScore, F1Score, BalancedAccuracy,
          )
          print("All core imports OK")
          '
