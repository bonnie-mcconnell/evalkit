services:
  api:
    build: .
    ports:
      - "8000:8000"
    # Note: the REST API currently supports MockRunner only.
    # Real provider support (OpenAI, Anthropic) is via the CLI or Python API.
    # See README for details.
    volumes:
      # Results, reports, and checkpoints are written to ./results/ inside the container
      - ./results:/app/results
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Run the full workflow example (no API keys required)
  # Usage: docker compose --profile example up example
  example:
    build: .
    command: python examples/full_workflow.py
    profiles:
      - example
